name: Log Issue Events to Statsig

on:
  issues:
    types: [opened, closed]

jobs:
  log-to-statsig:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    steps:
      - name: Log issue creation to Statsig
        env:
          STATSIG_API_KEY: ${{ secrets.STATSIG_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          AUTHOR: ${{ github.event.issue.user.login }}
          CREATED_AT: ${{ github.event.issue.created_at }}
        run: |
          # Build JSON payload safely using jq to prevent injection attacks.
          # User-controlled fields (ISSUE_TITLE, AUTHOR) are passed as jq args,
          # which guarantees proper JSON escaping of all special characters.
          EVENT_PAYLOAD=$(jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg repo "$REPO" \
            --arg title "$ISSUE_TITLE" \
            --arg author "$AUTHOR" \
            --arg created_at "$CREATED_AT" \
            --argjson time "$(date +%s)000" \
            '{
              events: [{
                eventName: "github_issue_created",
                metadata: {
                  issue_number: $issue_number,
                  repository: $repo,
                  title: $title,
                  author: $author,
                  created_at: $created_at
                },
                time: $time
              }]
            }')

          curl -X POST "https://events.statsigapi.net/v1/log_event" \
            -H "Content-Type: application/json" \
            -H "statsig-api-key: $STATSIG_API_KEY" \
            -d "$EVENT_PAYLOAD"